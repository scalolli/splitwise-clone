name: Splitwise-Clone CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run Kotlin tests
        run: ./gradlew test

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Verify Render API key
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners?limit=1")
          echo "Render API auth check: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Render API authentication failed. Check the RENDER_API_KEY secret."
            exit 1
          fi

      - name: Trigger Render deploy
        run: curl --fail --silent "${{ secrets.RENDER_DEPLOY_HOOK }}" > /dev/null

      - name: Wait for Render deploy to complete
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: srv-d6sl0b7pm1nc73be8q60
        run: |
          echo "Waiting for deploy to start..."
          sleep 10
          DEPLOY_ID=$(curl --silent \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=1" \
            | jq -r '.[0].deploy.id')
          echo "Polling deploy $DEPLOY_ID..."
          for i in $(seq 1 30); do
            STATUS=$(curl --silent \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
              | jq -r '.status')
            echo "Attempt $i: status=$STATUS"
            case "$STATUS" in
              live)
                echo "Deploy succeeded."
                exit 0
                ;;
              build_failed|failed|canceled|deactivated)
                echo "Deploy failed with status: $STATUS"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for deploy."
          exit 1
